<!DOCTYPE html>
<html>
<head>
<link rel=stylesheet type="text/css" href="/house.css" title="House">
<script>

var RailLastStatus = 0;
var LayoutDetectors = null;

function newAction (id, text, command, state, disabled) {
    var button = document.createElement("button");
    button.innerHTML = text;
    button.type = 'button';
    button.disabled = disabled?true:false;
    button.resourceId = id;
    button.resourceState = state;
    button.onclick = command;
    return button;
}

function railCommand (url) {
    var command = new XMLHttpRequest();
    command.open("GET", url);
    command.onreadystatechange = function () {
        if (command.readyState === 4) {
            if (command.status === 200) {
                railShowStatus (JSON.parse(command.responseText));
            } else if ((command.status === 404) || (command.status === 500)) {
                window.alert ('Error '+command.status+': '+command.statusText);
            }
        }
    }
    command.send(null);
}

function railMoveCommand (id, dir) {
    railCommand ("/rail/move?id="+ id + "&dir=" + dir);
}

function railMove () {
    railMoveCommand (this.resourceId, this.resourceState);
}

function railStop () {
    railCommand ("/rail/stop?id="+ this.resourceId);
}

function railPark () {
    railCommand ("/rail/park?id="+ this.resourceId);
}

function railStopAll () {
    railCommand ("/rail/stop?urgent=1");
}

function railTrainAdd () {
    var id = document.getElementById ('trainid').value;
    var cars = document.getElementById ('traincars').value;
    cars = cars.replaceAll (" ", "+").replaceAll (",","+");
    railCommand ("/rail/train/consist?id="+ id + "&cars=" + cars);
}

function railEnter () {
    var id = this.resourceId;
    var dir = document.getElementById ('dir-'+id).value;
    var at = document.getElementById ('at-'+id).value;
    railCommand ("/rail/enter?id=" + id + "&dir=" + dir + "&at=" + at);
}

function railTrainDelete () {
    railCommand ("/rail/delete?id=" + this.resourceId);
}

function railSortTrains (a, b) {
    return a.id > b.id;
}

function railShowTrains (response) {

   var table = document.getElementById ('trains');
   for (var i = table.rows.length-1; i > 1; i--) {
      table.deleteRow(i);
   }
   if (!response.rail.train) return;

   var trains = response.rail.train.sort (railSortTrains);
   for (var i = 0; i < trains.length; i++) {

        var train = trains[i];

        var row = table.insertRow();

        var column = document.createElement("td");
        column.innerHTML = train.id;
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = train.cars?train.cars.join(' '):'';
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = train.dcc ? train.dcc : '';
        row.appendChild(column);

        column = document.createElement("td");
        if (train.proceed) {
            column.innerHTML = train.proceed[0];
        } else {
            var entry = document.createElement ('select');
            entry.id = 'dir-'+train.id;
            var opt = document.createElement ('option');
            opt.value = 'up';
            opt.innerHTML = 'Up';
            opt.selected = true;
            entry.appendChild(opt);
            opt = document.createElement ('option');
            opt.value = 'down';
            opt.innerHTML = 'Down';
            opt.selected = false;
            entry.appendChild(opt);
            column.appendChild(entry);
        }
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = train.proceed?''+train.proceed[1]:'';
        row.appendChild(column);

        column = document.createElement("td");
        if (train.head) {
            column.innerHTML = train.head[0]+' '+train.head[1];
        } else if (LayoutDetectors == null) {
            column.innerHTML = '';
        } else {
            var entry = document.createElement ('select');
            entry.id = 'at-'+train.id;
            for (var j = 0; j < LayoutDetectors.length; ++j) {
                var opt = document.createElement ('option');
                opt.value = LayoutDetectors[j];
                opt.innerHTML = LayoutDetectors[j];
                opt.selected = (j == 0);
                entry.appendChild(opt);
            }
            column.appendChild(entry);
        }
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = train.tail?train.tail[0]+' '+train.tail[1]:'';
        row.appendChild(column);

        column = document.createElement("td");
        if (train.proceed) {
            var disabled = (train.dcc)?false:true;
            column.appendChild (newAction (train.id, "Forward", railMove, "forward", disabled));
            column.appendChild (newAction (train.id, "Backward", railMove, "backward", disabled));
            column.appendChild (newAction (train.id, "Stop", railStop, "", disabled));
            column.appendChild (newAction (train.id, "Park", railPark, ""));
        } else {
            column.appendChild (newAction (train.id, "Enter", railEnter, ""));
        }
        column.appendChild (newAction (train.id, "Delete", railTrainDelete, ""));
        row.appendChild(column);
    }
}

function railShowStatus (response) {
   railShowTrains (response);
   RailLastStatus = response.latest;
}

function railLoadDetectors (response) {

   if (!response.rail.detector) return;
   var detectors = response.rail.detector;
   LayoutDetectors = new Array();
   for (var i = 0; i < detectors.length; ++i) {
       var detector = detectors[i];
       LayoutDetectors.push(detector[0]);
   }
   RailLastStatus = 0; // Force a table refresh.
}

function railGetDetectors () {

    var command = new XMLHttpRequest();
    command.open("GET", "/rail/track/detector");
    command.onreadystatechange = function () {
        if (command.readyState === 4) {
            if (command.status === 200) {
                railLoadDetectors (JSON.parse(command.responseText));
            }
        }
    }
    command.send(null);
}

function railStatus () {
    var url = "/rail/train/status";
    if (RailLastStatus) url += "?known=" + RailLastStatus;
    railCommand (url);
}

window.onload = function() {
   railGetDetectors();
   railStatus();
   setInterval (railStatus, 1000);
};
</script>
<head>
   <title>Trains</title>
</head>
<body>
   <nav>
   <table>
   <tr>
   <td><span>Trains</span></td>
   <td><a href="/rail/events.html">Events</a></td>
   </tr>
   </table>
   </nav>
   <main>
   <article>
   <section>
   <table class="housewidetable" border="0">
   <tr>
      <td width="90%"></td>
      <td width="10%"><button class="housepanelbutton" style="background-color: red;" onclick="railStopAll()">STOP</button></td>
   </td></tr>
   </table>
   </section>
   <section>
   <h1>Trains</h1>
   <table id="trains" class="housewidetable" border="0">
      <tr>
         <th width="6%">ID</th>
         <th width="28%">CONSIST</th>
         <th width="6%">DCC</th>
         <th width="6%">GOING</th>
         <th width="6%">SPEED</th>
         <th width="10%">HEAD</th>
         <th width="10%">TAIL</th>
         <th width="28%">CONTROLS</th>
      </tr>
      <tr>
         <th><input id="trainid" type="text" size="10" placeholder="ID"></th>
         <th><input id="traincars" type="text" size="32" placeholder="Cars"></th>
         <th></th>
         <th></th>
         <th></th>
         <th></th>
         <th></th>
         <th><button class="housepanelbutton" onclick="railTrainAdd()">ADD</button></th>
   </table>
   </section>
   </article>
   </main>
</body>
</html>
